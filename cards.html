<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cards</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#eef3fb;
color:#222;
padding-bottom:100px;

}

/*=========================
HEADER
=========================*/

.topBar{

height:75px;
padding:18px;

display:flex;
justify-content:space-between;
align-items:center;

background:#fff;

box-shadow:0 5px 20px rgba(0,0,0,.08);

position:sticky;
top:0;

z-index:99;

}

.topBar h2{

font-size:24px;

}

.topBar p{

font-size:13px;
color:#777;

}

.backBtn{

text-decoration:none;

padding:10px 18px;

background:#0A58CA;

color:#fff;

border-radius:12px;

font-weight:bold;

}

/*=========================
PAGE
=========================*/

.page{

width:94%;

max-width:450px;

margin:25px auto;

}

/*=========================
CARD
=========================*/

.cardWrapper{

perspective:1400px;

margin-bottom:30px;

}

.bankCard{

width:100%;
height:250px;

position:relative;

transform-style:preserve-3d;

transition:.8s;

}

.bankCard.flip{

transform:rotateY(180deg);

}

.front,
.back{

position:absolute;

width:100%;
height:100%;

border-radius:24px;

overflow:hidden;

backface-visibility:hidden;

}

/*=========================
FRONT
=========================*/

.front{

padding:25px;

background:

radial-gradient(circle at top right,#58A6FF 0%,#1D63D5 30%,#061B42 100%);

color:#fff;

box-shadow:

0 25px 60px rgba(0,0,0,.25),

inset 0 1px 0 rgba(255,255,255,.2);

border:1px solid rgba(255,255,255,.15);

}

.front:before{

content:"";

position:absolute;

width:320px;

height:320px;

border-radius:50%;

background:rgba(255,255,255,.05);

top:-180px;

right:-120px;

}

.front:after{

content:"";

position:absolute;

width:220px;

height:220px;

border-radius:50%;

background:rgba(255,255,255,.06);

bottom:-130px;

left:-80px;

}

/*=========================
BANK
=========================*/

.bankName{

font-size:22px;

font-weight:bold;

letter-spacing:1px;

}

.cardType{

position:absolute;

right:25px;

top:25px;

font-size:15px;

font-weight:bold;

}

/*=========================
CHIP
=========================*/

.chip{

margin-top:25px;

width:60px;

height:45px;

border-radius:10px;

background:

linear-gradient(135deg,#FCE28A,#C99516,#FFE48A);

position:relative;

box-shadow:

0 5px 10px rgba(0,0,0,.3);

}

.chip:before{

content:"";

position:absolute;

left:50%;

width:2px;

height:100%;

background:rgba(0,0,0,.25);

}

.chip:after{

content:"";

position:absolute;

top:50%;

height:2px;

width:100%;

background:rgba(0,0,0,.25);

}

/*=========================
CONTACTLESS
=========================*/

.contactless{

position:absolute;

top:78px;

right:35px;

font-size:34px;

opacity:.9;

}

/*=========================
CARD NUMBER
=========================*/

.number{

margin-top:35px;

font-size:28px;

letter-spacing:4px;

font-family:Courier New;

font-weight:bold;

text-shadow:0 2px 6px rgba(0,0,0,.4);

}

/*=========================
BOTTOM INFO
=========================*/

.info{

margin-top:28px;

display:flex;

justify-content:space-between;

}

.label{

font-size:10px;

opacity:.8;

letter-spacing:1px;

}

.value{

margin-top:5px;

font-size:17px;

font-weight:bold;

}

/*=========================
MASTERCARD
=========================*/

.mastercard{

position:absolute;

bottom:20px;

right:20px;

display:flex;

align-items:center;

}

.circle1{

width:42px;

height:42px;

background:#EB001B;

border-radius:50%;

}

.circle2{

width:42px;

height:42px;

background:#F79E1B;

border-radius:50%;

margin-left:-16px;

}

.masterText{

margin-left:10px;

font-size:14px;

font-weight:bold;

}

/*=========================
BACK
=========================*/

.back{

background:

linear-gradient(135deg,#111,#2d2d2d);

transform:rotateY(180deg);

}

.blackStrip{

height:55px;

margin-top:25px;

background:#000;

}

.signature{

width:85%;

height:45px;

margin:25px auto;

background:#fff;

display:flex;

justify-content:flex-end;

align-items:center;

padding-right:12px;

font-style:italic;

font-weight:bold;

color:#222;

}

.backInfo{

padding:0 25px;

color:#fff;

font-size:13px;

line-height:1.7;

}

/*=========================
BUTTONS
=========================*/

.buttons{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

margin-top:20px;

}

.buttons button{

padding:15px;

border:none;

border-radius:14px;

background:#0A58CA;

color:#fff;

font-size:15px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.buttons button:hover{

background:#0848a8;

}

/*=========================
ACCOUNT INFO
=========================*/

.details{

margin-top:30px;

background:#fff;

padding:20px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.detail{

display:flex;

justify-content:space-between;

padding:14px 0;

border-bottom:1px solid #eee;

}

.detail:last-child{

border:none;

}

.detail span:first-child{

color:#666;

}

.detail span:last-child{

font-weight:bold;

}

/*=========================
STATUS
=========================*/

.status{

padding:6px 12px;

border-radius:30px;

background:#d8f8df;

color:#12803d;

font-size:13px;

font-weight:bold;

}

</style>

</head>

<body>

<header class="topBar">

<div>

<h2>My Cards</h2>

<p>Your Banking Card</p>

</div>

<a href="dashboard.html" class="backBtn">
Back
</a>

</header>

<div class="page">

<div class="cardWrapper">

<div class="bankCard" id="bankCard">

<!-- FRONT -->

<div class="front">

<div class="bankName">
Demo Bank
</div>

<div class="cardType">
DEBIT
</div>

<div class="chip"></div>

<div class="contactless">
📶
</div>

<div class="number" id="cardNumber">
•••• •••• •••• ••••
</div>

<div class="info">

<div>

<div class="label">
CARD HOLDER
</div>

<div class="value" id="cardHolder">
Loading...
</div>

</div>

<div>

<div class="label">
EXPIRES
</div>

<div class="value" id="expiry">
12/30
</div>

</div>

</div>

<div class="mastercard">

<div class="circle1"></div>

<div class="circle2"></div>

<div class="masterText">
mastercard
</div>

</div>

</div>

<!-- BACK -->

<div class="back">

<div class="blackStrip"></div>

<div class="signature">

<span id="cvv">
123
</span>

</div>

<div class="backInfo">

Customer Service<br>

+1 (800) 123-4567

<br><br>

Authorized Signature

</div>

</div>

</div>

</div>

<div class="buttons">

<button id="flipCard">
Flip Card
</button>

<button id="copyCard">
Copy Number
</button>

</div>

<div class="details">

<div class="detail">

<span>Account Number</span>

<span id="accountNumber">
Loading...
</span>

</div>

<div class="detail">

<span>Email</span>

<span id="email">
Loading...
</span>

</div>

<div class="detail">

<span>Status</span>

<span class="status" id="status">
ACTIVE
</span>

</div>

</div>

<script type="module">

import {
    auth,
    db,
    ref,
    get
} from "./js/firebase.js";

/* ==========================
AUTH
========================== */

auth.onAuthStateChanged(async(user)=>{

    if(!user){

        location.href="login.html";
        return;

    }

    await loadCard(user.uid);

});

/* ==========================
LOAD CARD
========================== */

async function loadCard(uid){

    try{

        const snapshot=await get(
            ref(db,"users/"+uid)
        );

        if(!snapshot.exists()) return;

        const data=snapshot.val();

        document.getElementById("cardHolder").textContent=
            (data.fullname||data.name||"Demo User").toUpperCase();

        document.getElementById("expiry").textContent=
            data.expiry||"12/30";

        document.getElementById("cvv").textContent=
            data.cvv||"000";

        document.getElementById("accountNumber").textContent=
            data.accountNumber||"";

        document.getElementById("email").textContent=
            data.email||"";

        document.getElementById("status").textContent=
            data.status||"ACTIVE";

        const formattedNumber=formatCardNumber(
            data.cardNumber||"0000000000000000"
        );

        document.getElementById("cardNumber").textContent=
            formattedNumber;

        window.cardNumberCopy=
            formattedNumber;

    }catch(error){

        console.log(error);

    }

}

/* ==========================
FORMAT CARD NUMBER
========================== */

function formatCardNumber(number){

    number=String(number).replace(/\s/g,'');

    return number.replace(/(.{4})/g,"$1 ").trim();

}

/* ==========================
FLIP CARD
========================== */

const card=document.getElementById("bankCard");

document
.getElementById("flipCard")
.onclick=function(){

    card.classList.toggle("flip");

};

/* ==========================
COPY CARD
========================== */

document
.getElementById("copyCard")
.onclick=async function(){

    try{

        await navigator.clipboard.writeText(
            window.cardNumberCopy
        );

        this.innerHTML="Copied ✓";

        setTimeout(()=>{

            this.innerHTML="Copy Number";

        },1800);

    }catch{

        alert("Unable to copy.");

    }

};

/* ==========================
SHOW / HIDE CARD NUMBER
========================== */

let hidden=false;

const cardNumber=
document.getElementById("cardNumber");

cardNumber.onclick=function(){

    hidden=!hidden;

    if(hidden){

        const number=
        window.cardNumberCopy
        .replace(/\d(?=\d{4})/g,"•");

        cardNumber.textContent=number;

    }else{

        cardNumber.textContent=
        window.cardNumberCopy;

    }

};

/* ==========================
CARD TILT EFFECT
========================== */

const wrapper=
document.querySelector(".cardWrapper");

wrapper.addEventListener("mousemove",function(e){

    const rect=this.getBoundingClientRect();

    const x=e.clientX-rect.left;

    const y=e.clientY-rect.top;

    const rotateY=(x-rect.width/2)/18;

    const rotateX=(rect.height/2-y)/18;

    card.style.transform=
        `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

});

wrapper.addEventListener("mouseleave",function(){

    if(card.classList.contains("flip")){

        card.style.transform="rotateY(180deg)";

    }else{

        card.style.transform="rotateX(0deg) rotateY(0deg)";

    }

});

/* ==========================
LONG PRESS TO SHOW CVV
========================== */

let timer;

document
.getElementById("cvv")
.addEventListener("touchstart",function(){

    timer=setTimeout(()=>{

        alert(
            "CVV : "+
            document.getElementById("cvv").textContent
        );

    },800);

});

document
.getElementById("cvv")
.addEventListener("touchend",function(){

    clearTimeout(timer);

});

</script>

</div>

</body>
</html>

</body>
</html>

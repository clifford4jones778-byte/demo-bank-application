<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Bank</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animation.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0d6efd,#1aa7ff);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:400px;
            background:#fff;
            border-radius:25px;
            padding:40px 30px;
            text-align:center;
            box-shadow:0 20px 60px rgba(0,0,0,.18);
            animation:fadeIn .6s ease;
        }

        .logo{
            width:90px;
            height:90px;
            margin:auto;
            border-radius:50%;
            background:#0d6efd;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:42px;
            box-shadow:0 10px 30px rgba(13,110,253,.35);
        }

        h1{
            margin-top:20px;
            color:#222;
            font-size:30px;
        }

        p{
            margin:15px 0 35px;
            color:#666;
            line-height:1.6;
        }

        .btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:#0d6efd;
            color:#fff;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#0056d6;
            transform:translateY(-2px);
        }

        .footer{
            margin-top:30px;
            color:#888;
            font-size:13px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">💳</div>

    <h1>Demo Bank</h1>

    <p>
        Welcome to Demo Bank.<br>
        Fast, Secure and Reliable Digital Banking.
    </p>

    <button class="btn" id="loginBtn">
        Login
    </button>

    <div class="footer">
        © 2026 Demo Bank. All Rights Reserved.
    </div>

</div>

<script>
const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click",function(){

    loginBtn.disabled = true;
    loginBtn.textContent = "Opening...";

    setTimeout(function(){
        window.location.href = "login.html";
    },300);

});
</script>

</body>
</html>
